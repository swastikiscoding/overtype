    <rect x="406" y="0" width="40" height="40" rx="6" class="key" /><text x="426" y="24" class="lbl">M</text>
    <rect x="452" y="0" width="40" height="40" rx="6" class="key" /><text x="472" y="24" class="lbl">,</text>
    <rect x="498" y="0" width="40" height="40" rx="6" class="key" /><text x="518" y="24" class="lbl">.</text>
    <rect x="544" y="0" width="40" height="40" rx="6" class="key" /><text x="564" y="24" class="lbl">/</text>

    <rect x="590" y="0" width="78" height="40" rx="6" class="key" />
