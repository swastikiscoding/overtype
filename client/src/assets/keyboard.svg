    <rect x="191" y="0" width="40" height="40" rx="6" class="key" /><text x="211" y="24" class="lbl">E</text>
    <rect x="237" y="0" width="40" height="40" rx="6" class="key" /><text x="257" y="24" class="lbl">R</text>
