    <rect x="398" y="0" width="40" height="40" rx="6" class="key" /><text x="418" y="24" class="lbl">8</text>
    <rect x="444" y="0" width="40" height="40" rx="6" class="key" /><text x="464" y="24" class="lbl">9</text>
    <rect x="490" y="0" width="40" height="40" rx="6" class="key" /><text x="510" y="24" class="lbl">0</text>
    <rect x="536" y="0" width="40" height="40" rx="6" class="key" /><text x="556" y="24" class="lbl">-</text>
