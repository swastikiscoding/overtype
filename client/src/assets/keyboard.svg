<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 744 284" width="100%" height="100%">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C850F2" />
      <stop offset="100%" stop-color="#5E29FF" />
    </linearGradient>
  </defs>

  <style>
    /* Clean flat styling */
    .key { fill: #251c33; transition: fill 0.2s ease; }
    .key:hover { fill: #36284a; cursor: pointer; }
    
    .accent { fill: url(#brandGrad); transition: opacity 0.2s ease; }
    .accent:hover { opacity: 0.85; cursor: pointer; }
    
    .wasd { fill: #2c1f40; stroke: url(#brandGrad); stroke-width: 1.5px; transition: fill 0.2s ease; }
    .wasd:hover { fill: #3a2559; cursor: pointer; }
    
    /* Typography */
    .lbl { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 600; fill: #e2d8f0; font-size: 12px; text-anchor: middle; pointer-events: none; }
    .lbl-mod { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 600; fill: #a99cb8; font-size: 10px; letter-spacing: 0.5px; text-anchor: middle; pointer-events: none; }
    .lbl-acc { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; fill: #ffffff; font-size: 11px; letter-spacing: 1px; text-anchor: middle; pointer-events: none; }
    
    /* Arrow Icons */
    .arrow { stroke: #e2d8f0; stroke-width: 2px; fill: none; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
  </style>

  <rect x="0" y="0" width="744" height="284" rx="16" fill="#130e1b" stroke="url(#brandGrad)" stroke-width="2" />
  <rect x="14" y="14" width="716" height="256" rx="8" fill="#1a1425" />
  
  <rect x="30" y="19" width="684" height="2" rx="1" fill="url(#brandGrad)" opacity="0.6" />

  <g transform="translate(0, 30)">
    <rect x="30" y="0" width="40" height="40" rx="6" class="accent" />
    <text x="50" y="24" class="lbl-acc">ESC</text>

    <rect x="76" y="0" width="40" height="40" rx="6" class="key" /><text x="96" y="24" class="lbl">1</text>
    <rect x="122" y="0" width="40" height="40" rx="6" class="key" /><text x="142" y="24" class="lbl">2</text>
    <rect x="168" y="0" width="40" height="40" rx="6" class="key" /><text x="188" y="24" class="lbl">3</text>
