    <rect x="513" y="0" width="40" height="40" rx="6" class="key" /><text x="533" y="24" class="lbl">P</text>
    <rect x="559" y="0" width="40" height="40" rx="6" class="key" /><text x="579" y="24" class="lbl">[</text>
    <rect x="605" y="0" width="40" height="40" rx="6" class="key" /><text x="625" y="24" class="lbl">]</text>

