  <g transform="translate(0, 214)">
    <rect x="30" y="0" width="51" height="40" rx="6" class="key" />
    <text x="55.5" y="24" class="lbl-mod">CTRL</text>

    <rect x="87" y="0" width="52" height="40" rx="6" class="key" />
